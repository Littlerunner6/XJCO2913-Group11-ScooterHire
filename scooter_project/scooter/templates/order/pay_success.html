{% extends "base.html" %}

{% block title %}支付成功{% endblock %}

{% block content %}
    <h1>支付成功！</h1>
    <div>
        <p>订单ID：{{ order.id }}</p>
        <p>滑板车编号：{{ order.scooter.name }}</p>
        <p>租赁时长：{{ order.hire_period_cn }}</p>
        <p>订单原价：¥{{ origin_price }}</p>
        <p>订单折后价：¥{{ order.total_price }}</p>
        <p>当前状态：{{ order.pay_status_cn }}</p>
    </div>

    <a href="{% url 'my_orders' %}">查看我的订单</a>
    <a href="{% url 'index' %}">返回首页</a>
{% endblock %}
