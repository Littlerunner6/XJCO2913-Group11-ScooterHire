{% extends "base.html" %}

{% block title %}订单支付{% endblock %}

{% block content %}
    <h1>订单支付</h1>
    <div>
        <p>订单ID：{{ order.id }}</p>
        <p>滑板车编号：{{ order.scooter.name }}</p>
        <p>租赁时长：{{ hire_period }}</p>
        <p>订单总价：¥{{ order.total_price }}</p>
        <p>当前状态：{{ pay_status }}</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <button type="submit">确认支付</button>
    </form>

    <a href="{% url 'index' %}">返回首页</a>
{% endblock %}
