{% extends "base.html" %}

{% block title %}我的银行卡{% endblock %}

{% block content %}
    <h1>添加银行卡</h1>
    {% if msg %}<p style="color:red">{{ msg }}</p>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div>
            <label>银行名称：</label>
            <input type="text" name="bank_name" required>
        </div>
        <div>
            <label>银行卡号：</label>
            <input type="text" name="card_num" required>
            <small>我们仅安全保存后4位</small>
        </div>
        <button type="submit">保存</button>
    </form>
    
    <a href="{% url 'index' %}">返回首页</a>
{% endblock %}
