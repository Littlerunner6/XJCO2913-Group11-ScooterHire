{% extends "base.html" %}

{% block title %}预订滑板车-{{ scooter.name }}{% endblock %}

{% block content %}
    <h1>预订滑板车：{{ scooter.name }}</h1>
    <div>
        <p>1小时价格：¥{{ scooter.price_1h }}</p>
        <p>4小时价格：¥{{ scooter.price_4h }}</p>
        <p>1天价格：¥{{ scooter.price_1d }}</p>
        <p>1周价格：¥{{ scooter.price_1w }}</p>
    </div>

    <form action="{% url 'submit_order' %}" method="post">
        {% csrf_token %}
        <input type="hidden" name="scooter_id" value="{{ scooter.id }}">

        <div>
            <label>选择租赁时长：</label>
            <select name="hire_period" required>
                <option value="">-- 请选择 --</option>
                <option value="1h">1小时（¥{{ scooter.price_1h }}）</option>
                <option value="4h">4小时（¥{{ scooter.price_4h }}）</option>
                <option value="1d">1天（¥{{ scooter.price_1d }}）</option>
                <option value="1w">1周（¥{{ scooter.price_1w }}）</option>
            </select>
        </div>

        <button type="submit">确认预订</button>
    </form>

    <a href="{% url 'index' %}">返回首页</a>
{% endblock %}
