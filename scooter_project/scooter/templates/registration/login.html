{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<section class="section">
    <div class="container container--narrow">
        <article class="card card--glass">
            <div class="card__body stack">
                <h1>登录账号</h1>
                <p class="text-muted">输入用户名和密码继续使用租赁服务。</p>

                {% if form.errors %}
                    <div class="alert alert--error" role="alert" aria-live="assertive">
                        <strong>登录失败</strong>
                        <span>用户名或密码错误，请重试。</span>
                    </div>
                {% endif %}

                <form method="post" class="form" aria-label="登录表单">
                    {% csrf_token %}
                    {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}

                    <div class="form-group">
                        <label for="id_username" class="form-label">用户名</label>
                        <input id="id_username" name="username" type="text" class="form-input" required autocomplete="username" value="{{ form.username.value|default_if_none:'' }}">
                    </div>

                    <div class="form-group">
                        <label for="id_password" class="form-label">密码</label>
                        <input id="id_password" name="password" type="password" class="form-input" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn--primary btn--full">登录</button>
                </form>

                <p class="text-sm text-secondary">还没有账号？<a href="{% url 'register' %}">立即注册</a></p>
            </div>
        </article>
    </div>
</section>
{% endblock %}
