{% extends "base.html" %}

{% block title %}取消订单成功{% endblock %}

{% block content %}
<section class="section">
    <div class="container container--narrow">
        <article class="card">
            <div class="card__body stack">
                <h1>订单已取消</h1>
                <div class="alert alert--success" role="status">
                    <strong>取消成功</strong>
                    <span>该订单状态已更新为“{{ order.pay_status_cn }}”。</span>
                </div>

                <div class="meta-list">
                    <div class="meta-item"><span>订单 ID</span><span class="font-medium">#{{ order.id }}</span></div>
                    <div class="meta-item"><span>滑板车</span><span class="font-medium">{{ order.scooter.name }}</span></div>
                    <div class="meta-item"><span>租赁时长</span><span class="font-medium">{{ order.hire_period_cn }}</span></div>
                    <div class="meta-item"><span>订单金额</span><span class="font-medium">¥{{ order.total_price }}</span></div>
                </div>

                <div class="toolbar">
                    <a href="{% url 'my_orders' %}" class="btn btn--primary">查看我的订单</a>
                    <a href="{% url 'index' %}" class="btn btn--ghost">返回首页</a>
                </div>
            </div>
        </article>
    </div>
</section>
{% endblock %}
