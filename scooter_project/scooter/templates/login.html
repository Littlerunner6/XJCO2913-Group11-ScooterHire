{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
    <h1>登录</h1>
    <form method="post">
        {% csrf_token %}

        {% if form.errors %}
            <p>用户名或密码错误，请重新输入！</p>
        {% endif %}
        
        <div>
            <label>用户名：</label>
            {{ form.username }}
        </div>
        <div class="form-item">
            <label>密码：</label>
            {{ form.password }}
        </div>
        <button type="submit">登录</button>
    </form>
{% endblock %}
