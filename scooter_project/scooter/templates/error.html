{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "操作失败" %}{% endblock %}

{% block content %}
<section class="section">
    <div class="container container--narrow">
        <article class="card">
            <div class="card__body stack">
                <h1>{% trans "操作失败" %}</h1>
                <div class="alert alert--error" role="alert">
                    <strong>{% trans "请求未完成" %}</strong>
                    <span>{{ msg }}</span>
                </div>
                <div class="toolbar">
                    <a href="{% url 'index' %}" class="btn btn--primary">{% trans "返回首页" %}</a>
                </div>
            </div>
        </article>
    </div>
</section>
{% endblock %}
